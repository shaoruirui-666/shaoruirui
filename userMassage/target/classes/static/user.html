<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>用户信息展示</title>
</head>
<body>
<div id="app" style="background-image: url('/1775566518195_17.webp'); background-size: cover; background-position: center; min-height: 100vh; padding: 20px;">
    <h1 style="text-align: center; font-weight: bold; color: #333; text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);">用户信息展示</h1>
    <table style="width: 80%; margin: 20px auto; border-collapse: collapse; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); background-color: rgba(255, 255, 255, 0.9);">
        <thead>
            <tr style="background-color: #f2f2f2;">
                <th style="padding: 12px 15px; border: 1px solid #ddd; text-align: left;">id</th>
                <th style="padding: 12px 15px; border: 1px solid #ddd; text-align: left;">用户名</th>
                <th style="padding: 12px 15px; border: 1px solid #ddd; text-align: left;">年龄</th>
                <th style="padding: 12px 15px; border: 1px solid #ddd; text-align: left;">密码</th>
                <th style="padding: 12px 15px; border: 1px solid #ddd; text-align: left;">最后登陆日期</th>
            </tr>
        </thead>
        <tbody>
            <tr v-for="(User, index) in userList" :key="User.id" style="transition: background-color 0.3s;" onmouseover="this.style.backgroundColor='#f5f5f5'" onmouseout="this.style.backgroundColor=''">
                <td style="padding: 12px 15px; border: 1px solid #ddd;">{{User.id}}</td>
                <td style="padding: 12px 15px; border: 1px solid #ddd;">{{User.name}}</td>
                <td style="padding: 12px 15px; border: 1px solid #ddd;">{{User.age}}</td>
                <td style="padding: 12px 15px; border: 1px solid #ddd;">{{User.password}}</td>
                <td style="padding: 12px 15px; border: 1px solid #ddd;">{{User.updatetime}}</td>
            </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" >
        import{createApp} from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js';
createApp({
    data(){
        return{
            userList:[]
        }
    },
    methods:{
        async search(){
            let res=  await axios.get('/list'
               );
            this.userList=res.data;
        }
    },
    mounted(){
        this.search();
    }
}).mount('#app');
    </script>
</body>
</html>
